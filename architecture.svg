<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'PingFang SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" fill="url(#bg)" rx="12"/>
  <rect width="860" height="420" fill="none" stroke="#334155" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700" letter-spacing="1">
    FLYTOex NetWork · WARP Script — Google Gemini 送中 · 架构图
  </text>
  <line x1="60" y1="44" x2="800" y2="44" stroke="#334155" stroke-width="1"/>

  <!-- ── Row 1 label ── -->
  <text x="430" y="68" text-anchor="middle" fill="#64748b" font-size="11">流量路径（仅 Google IP 段经 WARP 转发，其他流量直连）</text>

  <!-- ── Node 1: Application ── -->
  <rect x="20" y="88" width="110" height="64" rx="8" fill="url(#gBlue)" filter="url(#shadow)"/>
  <text x="75" y="114" text-anchor="middle" fill="white" font-size="12" font-weight="700">应用程序</text>
  <text x="75" y="130" text-anchor="middle" fill="#bfdbfe" font-size="10">curl / SDK / 任意进程</text>
  <text x="75" y="144" text-anchor="middle" fill="#bfdbfe" font-size="10">TCP → google.com:443</text>

  <!-- Arrow 1→2 -->
  <line x1="130" y1="120" x2="165" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Node 2: iptables ── -->
  <rect x="166" y="88" width="120" height="64" rx="8" fill="url(#gOrange)" filter="url(#shadow)"/>
  <text x="226" y="110" text-anchor="middle" fill="white" font-size="12" font-weight="700">iptables</text>
  <text x="226" y="126" text-anchor="middle" fill="#fde68a" font-size="10">OUTPUT → WARP_GOOGLE</text>
  <text x="226" y="140" text-anchor="middle" fill="#fde68a" font-size="10">REDIRECT :12345</text>

  <!-- Arrow 2→3 -->
  <line x1="286" y1="120" x2="321" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Node 3: ipset ── -->
  <rect x="322" y="88" width="116" height="64" rx="8" fill="url(#gCyan)" filter="url(#shadow)"/>
  <text x="380" y="110" text-anchor="middle" fill="white" font-size="12" font-weight="700">ipset</text>
  <text x="380" y="126" text-anchor="middle" fill="#a5f3fc" font-size="10">warp_google4</text>
  <text x="380" y="140" text-anchor="middle" fill="#a5f3fc" font-size="10">96+ Google IPv4 CIDRs</text>

  <!-- Arrow 3→4 -->
  <line x1="438" y1="120" x2="473" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Node 4: ipt2socks ── -->
  <rect x="474" y="88" width="120" height="64" rx="8" fill="url(#gPurple)" filter="url(#shadow)"/>
  <text x="534" y="110" text-anchor="middle" fill="white" font-size="12" font-weight="700">ipt2socks</text>
  <text x="534" y="126" text-anchor="middle" fill="#ddd6fe" font-size="10">透明 SOCKS5 转发</text>
  <text x="534" y="140" text-anchor="middle" fill="#ddd6fe" font-size="10">127.0.0.1:12345</text>

  <!-- Arrow 4→5 -->
  <line x1="594" y1="120" x2="629" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Node 5: warp-svc ── -->
  <rect x="630" y="88" width="120" height="64" rx="8" fill="url(#gGreen)" filter="url(#shadow)"/>
  <text x="690" y="110" text-anchor="middle" fill="white" font-size="12" font-weight="700">warp-svc</text>
  <text x="690" y="126" text-anchor="middle" fill="#a7f3d0" font-size="10">SOCKS5 代理</text>
  <text x="690" y="140" text-anchor="middle" fill="#a7f3d0" font-size="10">127.0.0.1:40000</text>

  <!-- Arrow 5→6 (up then right) -->
  <line x1="750" y1="120" x2="790" y2="120" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- ── Node 6: Cloudflare WARP ── -->
  <rect x="792" y="88" width="52" height="64" rx="8" fill="#f97316" filter="url(#shadow)"/>
  <text x="818" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">CF</text>
  <text x="818" y="130" text-anchor="middle" fill="#fed7aa" font-size="9">WARP</text>
  <text x="818" y="144" text-anchor="middle" fill="#fed7aa" font-size="9">Tunnel</text>

  <!-- ═══ QUIC Block row ═══ -->
  <rect x="322" y="190" width="116" height="50" rx="8" fill="url(#gRed)" filter="url(#shadow)" opacity="0.85"/>
  <text x="380" y="210" text-anchor="middle" fill="white" font-size="11" font-weight="700">QUIC 阻断</text>
  <text x="380" y="226" text-anchor="middle" fill="#fecaca" font-size="10">UDP 443 → REJECT</text>
  <text x="380" y="238" text-anchor="middle" fill="#fecaca" font-size="9">防止绕过透明代理</text>
  <!-- Dashed line from iptables to QUIC block -->
  <line x1="226" y1="152" x2="226" y2="215" stroke="#f87171" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="226" y1="215" x2="322" y2="215" stroke="#f87171" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- ═══ Bottom row: destination ═══ -->
  <rect x="630" y="270" width="220" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="296" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">Google / Gemini ✓</text>
  <text x="740" y="314" text-anchor="middle" fill="#94a3b8" font-size="10">generativelanguage.googleapis.com</text>
  <text x="740" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">gemini.google.com  ·  www.google.com</text>

  <!-- Arrow WARP → Google -->
  <line x1="818" y1="152" x2="818" y2="260" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="818" y1="260" x2="750" y2="270" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══ Left side: components box ═══ -->
  <rect x="20" y="190" width="280" height="190" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="160" y="210" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">系统组件</text>

  <!-- ENV file -->
  <rect x="34" y="218" width="252" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="46" y="234" fill="#fbbf24" font-size="11" font-weight="700">📄 /etc/warp-google/env</text>
  <text x="200" y="234" fill="#94a3b8" font-size="10">端口唯一真相来源</text>

  <!-- Services list -->
  <text x="34" y="267" fill="#7dd3fc" font-size="11">● warp-tproxy.service</text>
  <text x="190" y="267" fill="#64748b" font-size="10">EnvironmentFile= → env</text>
  <text x="34" y="284" fill="#7dd3fc" font-size="11">● warp-google.service</text>
  <text x="190" y="284" fill="#64748b" font-size="10">开机自启</text>
  <text x="34" y="301" fill="#7dd3fc" font-size="11">● warp-keepalive.timer</text>
  <text x="190" y="301" fill="#64748b" font-size="10">每 10 分钟自愈</text>
  <text x="34" y="318" fill="#7dd3fc" font-size="11">● warp-svc.service</text>
  <text x="190" y="318" fill="#64748b" font-size="10">Cloudflare WARP 客户端</text>

  <!-- Port conflict note -->
  <rect x="34" y="330" width="252" height="38" rx="5" fill="#1c1917" stroke="#57534e" stroke-width="1"/>
  <text x="46" y="345" fill="#a8a29e" font-size="10">端口冲突自动处理:</text>
  <text x="46" y="358" fill="#78716c" font-size="9">warp-svc 自占 → restart  |  外部进程 → auto-increment</text>

  <!-- ═══ Legend ═══ -->
  <line x1="500" y1="290" x2="530" y2="290" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="538" y="294" fill="#64748b" font-size="10">本地转发</text>
  <line x1="500" y1="310" x2="530" y2="310" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="538" y="314" fill="#22c55e" font-size="10">WARP 隧道</text>
  <line x1="500" y1="330" x2="530" y2="330" stroke="#f87171" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="538" y="334" fill="#f87171" font-size="10">QUIC 阻断</text>

  <!-- Footer -->
  <line x1="60" y1="396" x2="800" y2="396" stroke="#1e293b" stroke-width="1"/>
  <text x="430" y="412" text-anchor="middle" fill="#334155" font-size="10">
    github.com/panwudi/warp-script  ·  Fork of gzsteven666/warp-script  ·  FLYTOex NetWork
  </text>
</svg>
